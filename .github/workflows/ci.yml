name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + typecheck + test + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  build:
    name: build + zip + bundle budget
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm zip

      - name: Enforce bundle budget (≤ 2.5 MB zipped)
        run: |
          ZIP=$(ls .output/*-chrome.zip | head -1)
          SIZE=$(stat -c%s "$ZIP")
          MAX=$((2500 * 1024))
          echo "ZIP=$ZIP SIZE=$SIZE MAX=$MAX"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::error::Bundle $SIZE bytes exceeds 2.5 MB cap ($MAX)"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: chrome-zip
          path: .output/*-chrome.zip
          retention-days: 14
